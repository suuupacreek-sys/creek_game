<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>크릭 게임 🏇</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --pink: #ff6eb4;
    --yellow: #ffe066;
    --purple: #b77fff;
    --dark: #0e0720;
    --card: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.12);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
  }

  body {
    background: var(--dark);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    font-family: 'Noto Sans KR', sans-serif;
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(183,127,255,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, rgba(255,110,180,0.12) 0%, transparent 50%);
  }

  /* ── 데스크탑: 좌우 레이아웃 ── */
  #game-wrapper {
    display: flex;
    flex-direction: row;
    gap: 18px;
    align-items: flex-start;
  }

  #side-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 150px;
  }

  /* ── 모바일: 상하 레이아웃 ── */
  @media (max-width: 600px) {
    body { justify-content: flex-start; padding: 8px 0 0; }

    #game-wrapper {
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    #side-panel {
      flex-direction: row;
      width: 100%;
      padding: 0 8px;
      gap: 6px;
    }

    /* 모바일에서 순서 가이드 숨김 (공간 부족) */
    #guide-box { display: none; }

    .panel-box {
      flex: 1;
      padding: 8px 6px;
    }

    .panel-value { font-size: 22px; }
    .panel-label { font-size: 9px; }

    #next-fruit-canvas { width: 60px; height: 60px; }
  }

  .panel-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    backdrop-filter: blur(10px);
  }

  .panel-label { color: rgba(255,255,255,0.45); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
  .panel-value { color: #fff; font-size: 28px; font-weight: 900; line-height: 1; }

  #next-fruit-canvas { width: 90px; height: 90px; margin: 0 auto; display: block; }

  .fruit-guide { display: flex; flex-direction: column; gap: 4px; }
  .fruit-row { display: flex; align-items: center; gap: 6px; }
  .fruit-dot { border-radius: 50%; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .fruit-dot img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .fruit-name { color: rgba(255,255,255,0.65); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── 게임 영역 ── */
  #game-container { position: relative; flex-shrink: 0; }
  #game-canvas { border-radius: 12px; display: block; cursor: crosshair; border: 1px solid var(--border); touch-action: none; }

  #danger-line { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: rgba(255,80,80,0.35); pointer-events: none; }
  #danger-line::after { content: 'DANGER'; position: absolute; right: 8px; top: 3px; color: rgba(255,80,80,0.5); font-size: 9px; letter-spacing: 1px; }

  #drop-indicator { position: absolute; top: 0; width: 1px; background: rgba(255,255,255,0.18); pointer-events: none; }


  /* ── 오버레이 ── */
  .overlay {
    position: absolute; inset: 0;
    background: rgba(10,5,25,0.93);
    border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    backdrop-filter: blur(10px); padding: 20px;
  }
  .hidden { display: none !important; }
  .overlay h1 { color: #fff; font-size: 32px; font-weight: 900; text-shadow: 0 0 30px var(--pink); text-align: center; }

  .btn {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: white; border: none; padding: 12px 32px; border-radius: 50px;
    font-size: 17px; font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
    cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 20px rgba(255,110,180,0.35);
  }
  .btn:hover { transform: scale(1.04); }
  .btn:active { transform: scale(0.97); }

  /* RESET 버튼 - 캔버스 우측 상단 */
  #reset-btn {
    position: absolute;
    top: 8px; right: 8px;
    z-index: 10;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.6);
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    backdrop-filter: blur(6px);
  }
  #reset-btn:hover { background: rgba(255,80,80,0.3); border-color: rgba(255,80,80,0.5); color: #ff9090; }
  #reset-btn:active { transform: scale(0.94); }

  #mute-btn {
    position: absolute;
    top: 40px; right: 8px;
    z-index: 10;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.7);
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
  }
  #mute-btn:hover { background: rgba(255,255,255,0.15); }
  #mute-btn:active { transform: scale(0.9); }

  #score-popup-container { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 12px; }
  .score-popup {
    position: absolute; color: #FFD700; font-size: 18px; font-weight: 900;
    text-shadow: 0 0 10px rgba(255,215,0,0.8); pointer-events: none;
    animation: floatUp 0.9s ease-out forwards; white-space: nowrap;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    50%  { opacity: 1; transform: translateY(-25px) scale(1.1); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
  }

  /* 랭킹 버튼 */
  #ranking-btn {
    position: absolute; top: 8px; left: 8px; z-index: 10;
    background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.7); padding: 5px 10px; border-radius: 20px;
    font-size: 11px; font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
    cursor: pointer; letter-spacing: 1px; transition: all 0.15s; backdrop-filter: blur(6px);
  }
  #ranking-btn:hover { background: rgba(255,215,0,0.2); border-color: rgba(255,215,0,0.4); color: #FFD700; }

  .btn-sm {
    background: transparent; border: 1px solid var(--border);
    color: rgba(255,255,255,0.6); padding: 8px 20px; border-radius: 50px;
    font-size: 13px; font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-sm:hover { background: var(--card); color: #fff; }

  .name-input {
    background: rgba(255,255,255,0.08); border: 1px solid var(--border);
    border-radius: 10px; color: #fff; font-size: 18px;
    font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
    padding: 10px 16px; text-align: center; outline: none; width: 200px; transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--pink); }
  .name-input::placeholder { color: rgba(255,255,255,0.25); }

  .ranking-list {
    width: 100%; display: flex; flex-direction: column; gap: 6px;
    max-height: 320px; overflow-y: auto;
  }
  .ranking-list::-webkit-scrollbar { width: 3px; }
  .ranking-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .rank-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 12px;
  }
  .rank-num { color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 900; width: 24px; text-align: center; flex-shrink: 0; }
  .rank-medal { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
  .rank-name { color: #fff; font-size: 13px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rank-score { color: var(--yellow); font-size: 14px; font-weight: 900; flex-shrink: 0; }
  .rank-loading { color: rgba(255,255,255,0.4); font-size: 13px; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="side-panel">
    <div class="panel-box">
      <div class="panel-label">Score</div>
      <div class="panel-value" id="score-display">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Best</div>
      <div class="panel-value" id="best-display">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Next</div>
      <canvas id="next-fruit-canvas" width="90" height="90"></canvas>
    </div>
    <div class="panel-box" id="guide-box" style="padding:10px 8px;">
      <div class="panel-label" style="margin-bottom:7px;">순서</div>
      <div class="fruit-guide" id="fruit-guide"></div>
    </div>
  </div>

  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="danger-line"></div>
    <div id="drop-indicator"></div>
    <div id="score-popup-container"></div>
    <button id="reset-btn" onclick="confirmReset()">🔄 RESET</button>
    <button id="mute-btn" onclick="toggleMute()">🔊</button>
    <button id="ranking-btn" onclick="showRanking()">🏆 RANK</button>

    <div id="title-overlay" class="overlay">
        <div style="font-size:48px"><img src=https://i.imgur.com/oBI9chn.png width=200 height=200></div>
        <h1>크릭 게임</h1>
        <div style="color:rgba(255,255,255,0.5);font-size:12px;text-align:center;line-height:1.9">
          같은 우마를 합치면 더 강한 우마가!<br>위로 넘치면 게임 오버
        </div>
        <div style="color:rgba(255,255,255,0.45);font-size:11px;letter-spacing:1px;">모드 선택</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
          <button class="btn" onclick="startGame('bangdi')" style="padding:12px 24px;font-size:15px;">
            🍑 빵디 모드
          </button>
          <button class="btn" onclick="startGame('uyutong')" style="padding:12px 24px;font-size:15px;background:linear-gradient(135deg,#3498db,#9b59b6);">
            🥛 우유통 모드
          </button>
        </div>
        <button class="btn-sm" onclick="showRanking()">🏆 랭킹 보기</button>
      </div>

      <div id="gameover-overlay" class="overlay hidden">
        <div style="font-size:44px"><img src=https://i.imgur.com/oBI9chn.png width=200 height=200></div>
        <h1>게임 오버!</h1>
        <div style="color:var(--yellow);font-size:24px;font-weight:900" id="final-score-text"></div>
        <div id="new-record-text" class="hidden" style="color:var(--pink);font-size:15px;font-weight:700">🏆 최고 기록 갱신!</div>
        <div id="name-input-area" style="display:flex;flex-direction:column;align-items:center;gap:8px">
          <div style="color:rgba(255,255,255,0.5);font-size:11px;">랭킹에 등록할 닉네임</div>
          <input id="player-name" class="name-input" type="text" maxlength="10" placeholder="닉네임 입력">
          <button class="btn" onclick="submitScore()" style="padding:10px 28px;font-size:15px;">📝 등록</button>
        </div>
        <div id="submit-done" class="hidden" style="color:rgba(255,255,255,0.5);font-size:13px;">✅ 등록 완료!</div>
        <div style="display:flex;gap:10px;">
          <button class="btn" onclick="startGame(currentMode)">▶ 다시 시작</button>
          <button class="btn-sm" onclick="showRanking()">🏆 랭킹</button>
        </div>
    </div>
  </div>

    <!-- 랭킹 오버레이 -->
    <div id="ranking-overlay" class="overlay hidden">
      <h1 style="font-size:24px;">🏆 랭킹</h1>
      <div class="ranking-list" id="ranking-list">
        <div class="rank-loading">불러오는 중...</div>
      </div>
      <button class="btn" onclick="hideRanking()">← 돌아가기</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNESIKAyI7QlNFRLuuuPaMjFSWdk22GgQ",
  authDomain: "creekgame.firebaseapp.com",
  projectId: "creekgame",
  storageBucket: "creekgame.firebasestorage.app",
  messagingSenderId: "457181267190",
  appId: "1:457181267190:web:eacf385adbf6796335d8d7",
  measurementId: "G-5NG7BH0J2S"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
getAnalytics(app);

// 점수 등록 이벤트 수신
window.addEventListener('submitScore', async (e) => {
  const { name, score } = e.detail;
  try {
    await addDoc(collection(db, 'rankings'), {
      name, score, createdAt: serverTimestamp()
    });
    document.getElementById('name-input-area').classList.add('hidden');
    document.getElementById('submit-done').classList.remove('hidden');
  } catch(err) {
    alert('등록 실패 😢 다시 시도해주세요');
  }
});

// 랭킹 조회 이벤트 수신
window.addEventListener('fetchRanking', async () => {
  const list = document.getElementById('ranking-list');
  try {
    const q = query(collection(db, 'rankings'), orderBy('score', 'desc'), limit(20));
    const snap = await getDocs(q);
    const medals = ['🥇','🥈','🥉'];
    if (snap.empty) { list.innerHTML = '<div class="rank-loading">아직 기록이 없어요!</div>'; return; }
    list.innerHTML = '';
    let i = 0;
    snap.forEach(doc => {
      const d = doc.data();
      const row = document.createElement('div');
      row.className = 'rank-row';
      row.innerHTML = `
        <span class="${i < 3 ? 'rank-medal' : 'rank-num'}">${i < 3 ? medals[i] : (i+1)}</span>
        <span class="rank-name">${d.name}</span>
        <span class="rank-score">${d.score.toLocaleString()}</span>`;
      list.appendChild(row);
      i++;
    });
  } catch(err) {
    list.innerHTML = '<div class="rank-loading">불러오기 실패 😢</div>';
  }
});
</script>

<script>
// ── 모드별 캐릭터 데이터 ──────────────────────────────────────
const FRUITS_BANGDI = [
  { name: '마야노탑건',  radius: 14, color: '#e05a7a', score: 1,   emoji: '🍒', img: 'https://i.imgur.com/ZZ8zpLV.png' },
  { name: '카렌짱',      radius: 20, color: '#e94560', score: 3,   emoji: '🍓', img: 'https://i.imgur.com/QjWxWJF.png' },
  { name: '무테키',      radius: 27, color: '#9b5de5', score: 6,   emoji: '🍇', img: 'https://i.imgur.com/ydPELKy.png' },
  { name: '그래스원더',  radius: 34, color: '#f77f00', score: 10,  emoji: '🍊', img: 'https://i.imgur.com/84XTc4N.png' },
  { name: '비블로스',    radius: 40, color: '#c8a800', score: 15,  emoji: '🍋', img: 'https://i.imgur.com/Vbpr8gf.png' },
  { name: '젠틸돈나',    radius: 48, color: '#e74c3c', score: 21,  emoji: '🍎', img: 'https://i.imgur.com/VNMhcK7.png' },
  { name: '부르봉',      radius: 55, color: '#52b4e8', score: 28,  emoji: '🍐', img: 'https://i.imgur.com/MXEakAS.png' },
  { name: '골드쉽',      radius: 62, color: '#d48fb0', score: 36,  emoji: '🍑', img: 'https://i.imgur.com/40zKla7.png' },
  { name: '메이쇼도토',  radius: 70, color: '#d4a800', score: 45,  emoji: '🍍', img: 'https://i.imgur.com/9VRY1cI.png' },
  { name: '라모누',      radius: 78, color: '#52c41a', score: 55,  emoji: '🍈', img: 'https://i.imgur.com/PSFNPxD.png' },
  { name: '슈퍼크릭',    radius: 90, color: '#2ecc71', score: 100, emoji: '🍉', img: 'https://i.imgur.com/oBI9chn.png' },

const FRUITS_UYUTONG = [
  { name: '스즈카',       radius: 14, color: '#c0392b', score: 1,   emoji: '🌸', img: 'https://i.imgur.com/rNB2An3.png' },
  { name: '맥퀸',         radius: 20, color: '#8e44ad', score: 3,   emoji: '👑', img: 'https://i.imgur.com/1aaVUTr.png' },
  { name: '테이오',       radius: 27, color: '#2980b9', score: 6,   emoji: '⚡', img: 'https://i.imgur.com/OoT2G8m.png' },
  { name: '스페셜위크',   radius: 34, color: '#e67e22', score: 10,  emoji: '⭐', img: 'https://i.imgur.com/IIbspKq.png' },
  { name: '박신오',       radius: 40, color: '#27ae60', score: 15,  emoji: '🌿', img: 'https://i.imgur.com/Ri7sKQs.png' },
  { name: '후쿠키타루',   radius: 48, color: '#f39c12', score: 21,  emoji: '🍀', img: 'https://i.imgur.com/JcfflUI.png' },
  { name: '심볼리루돌프', radius: 55, color: '#1abc9c', score: 28,  emoji: '🦌', img: 'https://i.imgur.com/DGLbfyB.png' },
  { name: '에어그루브',   radius: 62, color: '#e74c3c', score: 36,  emoji: '💨', img: 'https://i.imgur.com/wnGv0x5.png' },
  { name: '시킹더펄',     radius: 70, color: '#9b59b6', score: 45,  emoji: '🔮', img: 'https://i.imgur.com/902FHgR.png' },
  { name: '마루젠스키',   radius: 78, color: '#3498db', score: 55,  emoji: '💙', img: 'https://i.imgur.com/IPAdTfK.png' },
  { name: '슈퍼크릭',     radius: 90, color: '#2ecc71', score: 100, emoji: '🏆', img: 'https://i.imgur.com/2KomHBX.png' },
];

let currentMode = 'bangdi'; // 'bangdi' | 'uyutong'
let FRUITS = FRUITS_BANGDI;

// ── 캔버스 크기 반응형 ──────────────────────────────────────────
const BASE_W = 400, BASE_H = 550;
let SCALE = 1, CANVAS_W = BASE_W, CANVAS_H = BASE_H;
const WALL_T = 30;
let DROP_Y = 40, DANGER_Y = 80;

function calcScale() {
  const isMobile = window.innerWidth <= 600;
  const BOTTOM_PAD = isMobile ? 28 : 16;
  const maxW = isMobile ? window.innerWidth - 16 : Math.min(window.innerWidth - 200, 420);
  const maxH = isMobile ? window.innerHeight - 130 - BOTTOM_PAD : window.innerHeight - 40 - BOTTOM_PAD;
  SCALE = Math.min(maxW / BASE_W, maxH / BASE_H, 1);
  CANVAS_W = Math.round(BASE_W * SCALE);
  CANVAS_H = Math.round(BASE_H * SCALE);
  DROP_Y = Math.round(40 * SCALE);
  DANGER_Y = Math.round(80 * SCALE);

  const dpr = window.devicePixelRatio || 1;
  const canvas = document.getElementById('game-canvas');
  canvas.width = Math.round(CANVAS_W * dpr);
  canvas.height = Math.round(CANVAS_H * dpr);
  canvas.style.width = CANVAS_W + 'px';
  canvas.style.height = CANVAS_H + 'px';
  canvas.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);

  // danger line 위치
  document.getElementById('danger-line').style.top = DANGER_Y + 'px';
}

// ── 이미지 프리로드 ────────────────────────────────────────────
const imgCache = new Map();
function reloadImgCache() {
  imgCache.clear();
  FRUITS.forEach((f, i) => {
    if (f.img) {
      const img = new Image();
      img.src = f.img;
      imgCache.set(i, img);
    }
  });
}
reloadImgCache();

const { Engine, Runner, Bodies, Body, World, Events, Composite } = Matter;

let engine, runner, world;
let score = 0;
let bestScore = parseInt(localStorage.getItem('cricket_best') || '0');
let currentFruitIdx = 0, nextFruitIdx = 0;
let canDrop = true, gameRunning = false;
let mouseX = CANVAS_W / 2;
let mergeQueue = [], bodyFruitMap = new Map(), gameOverTimer = null;

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-fruit-canvas');
const nextCtx = nextCanvas.getContext('2d');
const scoreDisplay = document.getElementById('score-display');
const bestDisplay = document.getElementById('best-display');
bestDisplay.textContent = bestScore;

// ── 가이드 ────────────────────────────────────────────────────
function buildGuide() {
  const guide = document.getElementById('fruit-guide');
  guide.innerHTML = '';
  FRUITS.forEach((f, i) => {
    const size = Math.max(8, Math.min(16, f.radius * 0.28));
    const row = document.createElement('div');
    row.className = 'fruit-row';
    row.innerHTML = `
      <div class="fruit-dot" style="width:${size}px;height:${size}px;background:${f.color};border:1.5px solid rgba(255,255,255,0.2)">
        ${f.img ? `<img src="${f.img}" onerror="this.style.display='none'">` : ''}
      </div>
      <span class="fruit-name">${f.name}</span>`;
    guide.appendChild(row);
  });
}
buildGuide();

// ── 물리 엔진 ─────────────────────────────────────────────────
function initPhysics() {
  engine = Engine.create({ gravity: { y: 1.8 } });
  world = engine.world;
  const s = SCALE;
  World.add(world, [
    Bodies.rectangle(CANVAS_W/2, CANVAS_H + WALL_T*s/2, CANVAS_W + WALL_T*s*2, WALL_T*s, { isStatic: true }),
    Bodies.rectangle(-WALL_T*s/2, CANVAS_H/2, WALL_T*s, CANVAS_H*3, { isStatic: true }),
    Bodies.rectangle(CANVAS_W + WALL_T*s/2, CANVAS_H/2, WALL_T*s, CANVAS_H*3, { isStatic: true }),
  ]);
  Events.on(engine, 'collisionStart', handleCollision);
  runner = Runner.create();
  Runner.run(runner, engine);
}

function handleCollision(event) {
  for (const { bodyA, bodyB } of event.pairs) {
    const idxA = bodyFruitMap.get(bodyA.id);
    const idxB = bodyFruitMap.get(bodyB.id);
    if (idxA === undefined || idxB === undefined || idxA !== idxB || idxA >= FRUITS.length - 1) continue;
    if (bodyA.merged || bodyB.merged) continue;
    bodyA.merged = true; bodyB.merged = true;
    mergeQueue.push({ idxA, bodyA, bodyB,
      mx: (bodyA.position.x + bodyB.position.x) / 2,
      my: (bodyA.position.y + bodyB.position.y) / 2,
    });
  }
}

function processMergeQueue() {
  for (const { idxA, bodyA, bodyB, mx, my } of mergeQueue) {
    World.remove(world, bodyA); World.remove(world, bodyB);
    bodyFruitMap.delete(bodyA.id); bodyFruitMap.delete(bodyB.id);
    addFruitBody(idxA + 1, mx, my, true);
    playMergeSound(idxA + 1);
    addScore(FRUITS[idxA + 1].score, mx, my);
  }
  mergeQueue = [];
}

function scaledRadius(idx) { return FRUITS[idx].radius * SCALE; }

function addFruitBody(idx, x, y, isMerge = false) {
  const body = Bodies.circle(x, y, scaledRadius(idx), { restitution: 0.2, friction: 0.5, density: 0.002 });
  if (isMerge) Body.setVelocity(body, { x: 0, y: -3 * SCALE });
  World.add(world, body);
  bodyFruitMap.set(body.id, idx);
}

// ── 사운드 ────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ── 빵디 모드 사운드 ────────────────────────────────────────
const dropSounds_bangdi = [
  new Audio('01.mp3'), // 마야노탑건
  new Audio('02.mp3'), // 카렌짱
  new Audio('03.mp3'), // 무테키
  new Audio('04.mp3'), // 그래스원더
  new Audio('05.mp3'), // 비블로스
  new Audio('06.mp3'), // 젠틸돈나
  new Audio('07.mp3'), // 부르봉
  null, null, null, null
];
const mergeSounds_bangdi = [
  new Audio('02.mp3'),  // 마야노탑건+마야노탑건 → 카렌짱
  new Audio('03.mp3'),  // 카렌짱+카렌짱 → 무테키
  new Audio('04.mp3'),  // 무테키+무테키 → 그래스원더
  new Audio('05.mp3'),  // 그래스원더+그래스원더 → 비블로스
  new Audio('06.mp3'),  // 비블로스+비블로스 → 젠틸돈나
  new Audio('07.mp3'),  // 젠틸돈나+젠틸돈나 → 부르봉
  new Audio('08.mp3'),  // 부르봉+부르봉 → 골드쉽
  new Audio('09.mp3'),  // 골드쉽+골드쉽 → 메이쇼도토
  new Audio('10.mp3'),  // 메이쇼도토+메이쇼도토 → 라모누
  new Audio('11.mp3'),  // 라모누+라모누 → 슈퍼크릭

// ── 우유통 모드 사운드 ──────────────────────────────────────
const dropSounds_uyutong = [
  new Audio('u01.mp3'), // 스즈카
  new Audio('u02.mp3'), // 맥퀸
  new Audio('u03.mp3'), // 테이오
  new Audio('u04.mp3'), // 스페셜위크
  new Audio('u05.mp3'), // 박신오
  new Audio('u06.mp3'), // 후쿠키타루
  new Audio('u07.mp3'), // 심볼리루돌프
  null, null, null, null
];
const mergeSounds_uyutong = [
  new Audio('u02.mp3'),  // 스즈카+스즈카 → 맥퀸
  new Audio('u03.mp3'),  // 맥퀸+맥퀸 → 테이오
  new Audio('u04.mp3'),  // 테이오+테이오 → 스페셜위크
  new Audio('u05.mp3'),  // 스페셜위크+스페셜위크 → 박신오
  new Audio('u06.mp3'),  // 박신오+박신오 → 후쿠키타루
  new Audio('u07.mp3'),  // 후쿠키타루+후쿠키타루 → 심볼리루돌프
  new Audio('u08.mp3'),  // 심볼리루돌프+심볼리루돌프 → 에어그루브
  new Audio('u09.mp3'),  // 에어그루브+에어그루브 → 시킹더펄
  new Audio('u10.mp3'),  // 시킹더펄+시킹더펄 → 마루젠스키
  new Audio('u11.mp3'),  // 마루젠스키+마루젠스키 → 슈퍼크릭
];

// ── 현재 모드 사운드 참조 (startGame에서 교체) ────────────
let dropSounds = dropSounds_bangdi;
let mergeSounds = mergeSounds_bangdi;

function playDropSound(idx) {
  if (isMuted) return;
  const s = dropSounds[idx];
  if (!s) return;
  const clone = s.cloneNode();
  clone.play().catch(() => {});
}

function playMergeSound(tier) {
  if (isMuted) return;
  const s = mergeSounds[tier - 1];
  if (!s) return;
  const clone = s.cloneNode();
  clone.play().catch(() => {});
}

// ── 점수 ──────────────────────────────────────────────────────
function addScore(pts, x, y) {
  score += pts;
  scoreDisplay.textContent = score;
  if (score > bestScore) {
    bestScore = score;
    bestDisplay.textContent = bestScore;
    localStorage.setItem('cricket_best', bestScore);
  }
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = `+${pts}`;
  el.style.left = (x - 20) + 'px';
  el.style.top = (y - 20) + 'px';
  document.getElementById('score-popup-container').appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// ── 그리기 ────────────────────────────────────────────────────
function lighten(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&0xff)+amt)},${Math.min(255,(n&0xff)+amt)})`;
}

function drawChar(c, idx, cx, cy, r, alpha = 1) {
  const f = FRUITS[idx];
  const img = imgCache.get(idx);
  const loaded = img && img.complete && img.naturalWidth > 0;

  c.save();
  c.globalAlpha = alpha;
  c.beginPath(); c.arc(cx, cy, r, 0, Math.PI * 2); c.clip();

  if (loaded) {
    c.fillStyle = f.color + '55'; c.fill();
    c.drawImage(img, cx - r, cy - r, r * 2, r * 2);
  } else {
    const grd = c.createRadialGradient(cx - r*0.3, cy - r*0.3, 0, cx, cy, r);
    grd.addColorStop(0, lighten(f.color, 50)); grd.addColorStop(1, f.color);
    c.fillStyle = grd; c.fill();
    c.font = `${Math.max(8, r * 0.9)}px serif`;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(f.emoji, cx, cy);
  }
  c.restore();

  c.save(); c.globalAlpha = alpha * 0.28;
  c.beginPath(); c.arc(cx, cy, r, 0, Math.PI * 2);
  c.strokeStyle = '#fff'; c.lineWidth = 1.5; c.stroke();
  c.restore();

}

function drawNextFruit() {
  const dpr = window.devicePixelRatio || 1;
  const CSS_W = 90, CSS_H = 90; // CSS 크기 고정
  nextCanvas.width = Math.round(CSS_W * dpr);
  nextCanvas.height = Math.round(CSS_H * dpr);
  nextCanvas.style.width = CSS_W + 'px';
  nextCanvas.style.height = CSS_H + 'px';
  nextCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  nextCtx.clearRect(0, 0, CSS_W, CSS_H);
  const f = FRUITS[nextFruitIdx];
  const r = Math.min(CSS_W * 0.33, f.radius * SCALE * 0.9);
  drawChar(nextCtx, nextFruitIdx, CSS_W/2, CSS_H * 0.44, r);
  nextCtx.font = `bold 10px 'Noto Sans KR', sans-serif`;
  nextCtx.textAlign = 'center';
  nextCtx.fillStyle = 'rgba(255,255,255,0.85)';
  nextCtx.shadowColor = 'rgba(0,0,0,0.8)';
  nextCtx.shadowBlur = 3;
  const sn = f.name.length > 7 ? f.name.slice(0,6)+'…' : f.name;
  nextCtx.fillText(sn, CSS_W/2, CSS_H * 0.88);
  nextCtx.shadowBlur = 0;
}

// ── 게임 루프 ─────────────────────────────────────────────────
function gameLoop() {
  if (!gameRunning) return;
  processMergeQueue();
  checkGameOver();

  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = '#0d0720'; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  const step = 40 * SCALE;
  ctx.strokeStyle = 'rgba(255,255,255,0.025)'; ctx.lineWidth = 1;
  for (let x = 0; x < CANVAS_W; x += step) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,CANVAS_H); ctx.stroke(); }
  for (let y = 0; y < CANVAS_H; y += step) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CANVAS_W,y); ctx.stroke(); }

  for (const body of Composite.allBodies(world)) {
    const idx = bodyFruitMap.get(body.id);
    if (idx === undefined) continue;
    ctx.save();
    ctx.translate(body.position.x, body.position.y);
    ctx.rotate(body.angle);
    drawChar(ctx, idx, 0, 0, scaledRadius(idx));
    ctx.restore();
  }

  if (canDrop) {
    const r = scaledRadius(currentFruitIdx);
    const wallPad = WALL_T * SCALE;
    const px = Math.max(r + wallPad, Math.min(CANVAS_W - r - wallPad, mouseX));
    ctx.setLineDash([3,6]); ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px, DROP_Y + r); ctx.lineTo(px, CANVAS_H); ctx.stroke();
    ctx.setLineDash([]);
    drawChar(ctx, currentFruitIdx, px, DROP_Y, r, 0.75);
  }

  requestAnimationFrame(gameLoop);
}

// ── 게임 오버 ─────────────────────────────────────────────────
function checkGameOver() {
  for (const body of Composite.allBodies(world)) {
    const idx = bodyFruitMap.get(body.id);
    if (idx === undefined) continue;
    if (body.position.y - scaledRadius(idx) < DANGER_Y &&
        Math.abs(body.velocity.y) < 0.5 && Math.abs(body.velocity.x) < 0.5) {
      if (!gameOverTimer) gameOverTimer = setTimeout(triggerGameOver, 1500);
      return;
    }
  }
  if (gameOverTimer) { clearTimeout(gameOverTimer); gameOverTimer = null; }
}

function triggerGameOver() {
  gameRunning = false; canDrop = false;
  document.getElementById('final-score-text').textContent = `최종 점수: ${score}`;
  const nr = document.getElementById('new-record-text');
  (score >= bestScore && score > 0) ? nr.classList.remove('hidden') : nr.classList.add('hidden');
  document.getElementById('name-input-area').classList.remove('hidden');
  document.getElementById('submit-done').classList.add('hidden');
  document.getElementById('player-name').value = '';
  document.getElementById('gameover-overlay').classList.remove('hidden');
}

function submitScore() {
  const name = document.getElementById('player-name').value.trim();
  if (!name) { alert('닉네임을 입력해주세요!'); return; }
  window.dispatchEvent(new CustomEvent('submitScore', { detail: { name, score } }));
}

async function showRanking() {
  document.getElementById('title-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('ranking-overlay').classList.remove('hidden');

  const list = document.getElementById('ranking-list');
  list.innerHTML = '<div class="rank-loading">불러오는 중...</div>';

  window.dispatchEvent(new Event('fetchRanking'));
}

function hideRanking() {
  document.getElementById('ranking-overlay').classList.add('hidden');
  if (!gameRunning) document.getElementById('title-overlay').classList.remove('hidden');
}

// ── 드롭 ──────────────────────────────────────────────────────
function dropFruit(x) {
  if (!canDrop || !gameRunning) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  canDrop = false;
  const r = scaledRadius(currentFruitIdx);
  const wallPad = WALL_T * SCALE;
  playDropSound(currentFruitIdx);
  addFruitBody(currentFruitIdx, Math.max(r + wallPad, Math.min(CANVAS_W - r - wallPad, x)), DROP_Y);
  currentFruitIdx = nextFruitIdx;
  nextFruitIdx = Math.floor(Math.random() * 5);
  drawNextFruit();
  setTimeout(() => { canDrop = true; }, 600);
}

// ── 뮤트 ──────────────────────────────────────────────────────
let isMuted = false;

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
}

// ── RESET ─────────────────────────────────────────────────────
function confirmReset() {
  if (!gameRunning) { startGame(currentMode); return; }
  if (confirm('게임을 리셋할까요?')) startGame(currentMode);
}

// ── 시작 ──────────────────────────────────────────────────────
function startGame(mode) {
  if (mode) {
    currentMode = mode;
    FRUITS = mode === 'uyutong' ? FRUITS_UYUTONG : FRUITS_BANGDI;
    dropSounds = mode === 'uyutong' ? dropSounds_uyutong : dropSounds_bangdi;
    mergeSounds = mode === 'uyutong' ? mergeSounds_uyutong : mergeSounds_bangdi;
    reloadImgCache();
    buildGuide();
  }
  document.getElementById('title-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('ranking-overlay').classList.add('hidden');
  if (engine) { Runner.stop(runner); World.clear(world); Engine.clear(engine); }
  bodyFruitMap.clear(); mergeQueue = [];
  score = 0; scoreDisplay.textContent = 0;
  canDrop = true; gameRunning = true; gameOverTimer = null;
  mouseX = CANVAS_W / 2;
  currentFruitIdx = Math.floor(Math.random() * 5);
  nextFruitIdx = Math.floor(Math.random() * 5);
  drawNextFruit();
  initPhysics();
  requestAnimationFrame(gameLoop);
}

// ── 초기 크기 계산 후 시작 ────────────────────────────────────
calcScale();
mouseX = CANVAS_W / 2;

window.addEventListener('resize', () => {
  calcScale();
  if (gameRunning) startGame();
});

// ── 이벤트 ────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX - canvas.getBoundingClientRect().left;
  const r = scaledRadius(currentFruitIdx);
  const wallPad = WALL_T * SCALE;
  const px = Math.max(r + wallPad, Math.min(CANVAS_W - r - wallPad, mouseX));
  const di = document.getElementById('drop-indicator');
  di.style.left = px + 'px'; di.style.height = CANVAS_H + 'px';
});

canvas.addEventListener('click', e => dropFruit(e.clientX - canvas.getBoundingClientRect().left));

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - rect.left;
  const r = scaledRadius(currentFruitIdx);
  const wallPad = WALL_T * SCALE;
  const px = Math.max(r + wallPad, Math.min(CANVAS_W - r - wallPad, mouseX));
  const di = document.getElementById('drop-indicator');
  di.style.left = px + 'px'; di.style.height = CANVAS_H + 'px';
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  dropFruit(e.changedTouches[0].clientX - canvas.getBoundingClientRect().left);
}, { passive: false });
</script>
